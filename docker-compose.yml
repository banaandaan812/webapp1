name: Eindopdracht
services:
  web:
    container_name: php_web
    build:
      context: .
      dockerfile_inline: |
        FROM php:8.4-apache
        RUN docker-php-ext-install pdo pdo_mysql
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./Restaurantwebapp1:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:lts
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: restaurantwebapp1
      MYSQL_USER: user
      MYSQL_PASSWORD: password

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db